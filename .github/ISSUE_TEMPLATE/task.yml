name: Task
description: Planned project work item
title: "[Task]: "
labels: ["type: task"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should be true when this task is done?
      placeholder: "Example: Executive dashboard filter state is persisted and documented."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
      placeholder: "Included: SQL view update. Excluded: model retraining."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List the checks that prove the task is complete.
      placeholder: "- Metric reconciles with SQL view\n- Tests or smoke checks pass\n- README or runbook updated when needed"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - analytics
        - dashboard
        - data-pipeline
        - ml
        - docs
        - ci
    validations:
      required: true
