<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1320 780" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Olist Intelligence data flow architecture</title>
  <desc id="desc">Architecture diagram showing Kaggle Olist CSV files flowing through local ingestion, SQLite or Postgres storage, quality checks, SQL marts, repository and service layers, and Streamlit or FastAPI outputs.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4a9eed"/>
    </marker>
    <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8b5cf6"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px "Segoe UI", Arial, sans-serif; fill: #1e1e1e; }
      .zone-title { font: 700 18px "Segoe UI", Arial, sans-serif; }
      .box-title { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #1e1e1e; }
      .box-sub { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #343a40; }
      .note { font: 500 17px "Segoe UI", Arial, sans-serif; fill: #495057; }
      .arrow-label { font: 600 14px "Segoe UI", Arial, sans-serif; fill: #495057; }
      .zone { opacity: 0.38; stroke-width: 2; }
      .box { stroke-width: 2.4; filter: url(#soft-shadow); }
      .arrow { fill: none; stroke: #1e1e1e; stroke-width: 2.4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1320" height="780" fill="#ffffff"/>
  <text x="660" y="52" text-anchor="middle" class="title">Olist Intelligence - Data Flow Architecture</text>

  <rect x="40" y="95" width="270" height="570" rx="20" fill="#dbe4ff" stroke="#4a9eed" class="zone"/>
  <text x="70" y="130" class="zone-title" fill="#2563eb">Source and Ingestion</text>

  <rect x="350" y="95" width="285" height="570" rx="20" fill="#d3f9d8" stroke="#22c55e" class="zone"/>
  <text x="380" y="130" class="zone-title" fill="#15803d">Processing + Local Store</text>

  <rect x="680" y="95" width="275" height="570" rx="20" fill="#e5dbff" stroke="#8b5cf6" class="zone"/>
  <text x="710" y="130" class="zone-title" fill="#6d28d9">Quality and Semantic Layer</text>

  <rect x="995" y="95" width="255" height="570" rx="20" fill="#fff3bf" stroke="#f59e0b" class="zone"/>
  <text x="1025" y="130" class="zone-title" fill="#92400e">Serving and Portfolio QA</text>

  <rect x="80" y="180" width="200" height="86" rx="16" fill="#a5d8ff" stroke="#4a9eed" class="box"/>
  <text x="180" y="216" text-anchor="middle" class="box-title">Kaggle Olist CSVs</text>
  <text x="180" y="242" text-anchor="middle" class="box-sub">9 source tables</text>

  <line x1="180" y1="266" x2="180" y2="325" stroke="#4a9eed" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <text x="195" y="302" class="arrow-label">local only</text>

  <rect x="80" y="325" width="200" height="76" rx="16" fill="#c3fae8" stroke="#06b6d4" class="box"/>
  <text x="180" y="356" text-anchor="middle" class="box-title">data/raw or</text>
  <text x="180" y="382" text-anchor="middle" class="box-sub">olist-dataset</text>

  <path d="M280 363 C310 363, 330 318, 365 318" class="arrow"/>
  <rect x="365" y="275" width="215" height="86" rx="16" fill="#d0bfff" stroke="#8b5cf6" class="box"/>
  <text x="472" y="310" text-anchor="middle" class="box-title">src/ml/ingest.py</text>
  <text x="472" y="336" text-anchor="middle" class="box-sub">CSV -&gt; tables</text>

  <line x1="472" y1="361" x2="472" y2="400" stroke="#1e1e1e" stroke-width="2.4" marker-end="url(#arrow)"/>
  <rect x="375" y="400" width="215" height="90" rx="16" fill="#c3fae8" stroke="#06b6d4" class="box"/>
  <text x="482" y="434" text-anchor="middle" class="box-title">SQLite olist.db</text>
  <text x="482" y="460" text-anchor="middle" class="box-sub">raw + derived tables</text>

  <rect x="375" y="530" width="215" height="78" rx="16" fill="#fff3bf" stroke="#f59e0b" class="box"/>
  <text x="482" y="561" text-anchor="middle" class="box-title">Notebooks 2 and 4</text>
  <text x="482" y="587" text-anchor="middle" class="box-sub">predictions + segments</text>
  <line x1="482" y1="530" x2="482" y2="490" stroke="#f59e0b" stroke-width="2.4" marker-end="url(#arrow-amber)"/>

  <path d="M590 445 C620 445, 645 445, 700 445" class="arrow"/>
  <rect x="710" y="200" width="210" height="90" rx="16" fill="#ffd8a8" stroke="#f59e0b" class="box"/>
  <text x="815" y="236" text-anchor="middle" class="box-title">Schema + quality</text>
  <text x="815" y="262" text-anchor="middle" class="box-sub">contracts and tests</text>

  <line x1="815" y1="290" x2="815" y2="370" stroke="#8b5cf6" stroke-width="2.4" marker-end="url(#arrow-purple)"/>
  <text x="830" y="337" class="arrow-label">validated metrics</text>

  <rect x="710" y="370" width="210" height="112" rx="16" fill="#eebefa" stroke="#ec4899" class="box"/>
  <text x="815" y="407" text-anchor="middle" class="box-title">SQL marts</text>
  <text x="815" y="433" text-anchor="middle" class="box-sub">orders, delivery, payment</text>
  <text x="815" y="457" text-anchor="middle" class="box-sub">cohort, seller SLA</text>

  <line x1="815" y1="482" x2="815" y2="535" stroke="#8b5cf6" stroke-width="2.4" marker-end="url(#arrow-purple)"/>
  <rect x="710" y="535" width="210" height="78" rx="16" fill="#d0bfff" stroke="#8b5cf6" class="box"/>
  <text x="815" y="566" text-anchor="middle" class="box-title">repository +</text>
  <text x="815" y="592" text-anchor="middle" class="box-sub">service layer</text>

  <path d="M920 574 C950 574, 970 574, 1010 574" class="arrow"/>

  <rect x="1020" y="220" width="200" height="98" rx="16" fill="#b2f2bb" stroke="#22c55e" class="box"/>
  <text x="1120" y="256" text-anchor="middle" class="box-title">Streamlit dashboard</text>
  <text x="1120" y="282" text-anchor="middle" class="box-sub">manager-facing views</text>

  <rect x="1020" y="385" width="200" height="88" rx="16" fill="#a5d8ff" stroke="#4a9eed" class="box"/>
  <text x="1120" y="421" text-anchor="middle" class="box-title">FastAPI</text>
  <text x="1120" y="447" text-anchor="middle" class="box-sub">predict + recommend</text>

  <rect x="1020" y="535" width="200" height="82" rx="16" fill="#fff3bf" stroke="#f59e0b" class="box"/>
  <text x="1120" y="568" text-anchor="middle" class="box-title">GitHub Actions</text>
  <text x="1120" y="594" text-anchor="middle" class="box-sub">lint + test gates</text>

  <line x1="1120" y1="318" x2="1120" y2="385" stroke="#1e1e1e" stroke-width="2.4" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <line x1="1120" y1="473" x2="1120" y2="535" stroke="#1e1e1e" stroke-width="2.4" stroke-dasharray="8 7" marker-end="url(#arrow)"/>

  <text x="60" y="718" class="note">Portfolio scope: local Kaggle data, reproducible checks, SQL-backed analytics, and dashboard storytelling.</text>
  <text x="60" y="744" class="note">Raw data and olist.db stay out of Git; the Project board is the canonical backlog/status tracker.</text>
</svg>
